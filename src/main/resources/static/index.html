<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Monolitisk API</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f6f7f9; margin: 0; color: #1c2430; }
    .wrap { max-width: 900px; margin: 40px auto; padding: 0 16px; }
    .card { background: #fff; border: 1px solid #e1e6ec; border-radius: 10px; padding: 18px; margin-bottom: 14px; }
    h1 { margin-top: 0; font-size: 28px; }
    .links { display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    a.btn { display: block; text-decoration: none; color: #0b3a78; border: 1px solid #c6d8ef; background: #eef5ff; padding: 12px; border-radius: 8px; text-align: center; font-weight: 600; }
    a.btn:hover { background: #e6f0ff; }
    .muted { color: #5f6d7a; }
    button { background: #0b3a78; color: #fff; border: 0; padding: 10px 14px; border-radius: 8px; cursor: pointer; }
    button:hover { background: #0a3369; }
    pre { background: #0f1720; color: #e5edf5; padding: 12px; border-radius: 8px; overflow: auto; min-height: 90px; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Monolitisk e-handel</h1>
    <p class="muted">Enkel testyta for att skapa data och mata prestandajamforelse mellan monolit och mikrotjanster.</p>
  </div>
  <div class="links">
    <a class="btn" href="/users">Users</a>
    <a class="btn" href="/products-ui">Products</a>
    <a class="btn" href="/orders">Orders</a>
    <a class="btn" href="/actuator/health">Health</a>
  </div>
  <div class="card">
    <h2>Snabb testsekvens</h2>
    <p class="muted">Skapar automatiskt user, product och order for snabb manuell verifiering.</p>
    <button id="runSequenceBtn">Kor testsekvens</button>
    <pre id="sequenceOutput">{}</pre>
  </div>
</div>
<script>
  const out = document.getElementById("sequenceOutput");
  const show = (data) => out.textContent = JSON.stringify(data, null, 2);

  async function api(url, options) {
    const res = await fetch(url, options);
    const data = await res.json();
    if (!res.ok) throw data;
    return data;
  }

  document.getElementById("runSequenceBtn").addEventListener("click", async () => {
    const runId = Date.now();
    try {
      const user = await api("/users", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name: `TestUser-${runId}`,
          email: `test-${runId}@example.com`
        })
      });

      const product = await api("/products", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name: `TestProduct-${runId}`,
          price: 99.99,
          stock: 10
        })
      });

      const order = await api("/orders", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          userId: user.id,
          items: [{ productId: product.id, quantity: 2 }]
        })
      });

      show({ ok: true, user, product, order });
    } catch (e) {
      show({ ok: false, error: e });
    }
  });
</script>
</body>
</html>
