services:
  postgres:
    image: ${DOCKER_POSTGRES_IMAGE:-postgres:16}
    container_name: ${DOCKER_POSTGRES_CONTAINER:-monolith-postgres}
    environment:
      POSTGRES_DB: ${DB_NAME:-monolith_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-monolith_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ${DOCKER_APP_CONTAINER:-monolith-app}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      APP_NAME: ${APP_NAME:-x-arbete-monolitisk}
      APP_PORT: ${APP_PORT:-8080}
      SPRING_PROFILE: ${SPRING_PROFILE:-default}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-monolith_db}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      SPRING_JPA_DDL_AUTO: ${SPRING_JPA_DDL_AUTO:-update}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}

volumes:
  pgdata:
